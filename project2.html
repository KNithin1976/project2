<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Catch the Box Game</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #222;
      color: white;
    }

    #gameArea {
      width: 400px;
      height: 400px;
      background: #333;
      margin: 20px auto;
      position: relative;
      border-radius: 10px;
    }

    #box {
      width: 50px;
      height: 50px;
      background: red;
      position: absolute;
      border-radius: 8px;
      cursor: pointer;
    }

    #score {
      font-size: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🎯 Catch the Box!</h1>
<p>Click the moving box as fast as you can!</p>

<div id="score">Score: 0</div>
<button onclick="startGame()">Start Game</button>

<div id="gameArea">
  <div id="box"></div>
</div>

<script>
  const box = document.getElementById('box');
  const scoreText = document.getElementById('score');
  let score = 0;
  let gameInterval;

  function moveBox() {
    const x = Math.random() * 350;
    const y = Math.random() * 350;

    box.style.left = x + 'px';
    box.style.top = y + 'px';
  }

  box.addEventListener('click', () => {
    score++;
    scoreText.textContent = 'Score: ' + score;
    moveBox();
  });

  function startGame() {
    score = 0;
    scoreText.textContent = 'Score: 0';

    moveBox();

    clearInterval(gameInterval);
    gameInterval = setInterval(moveBox, 1000);
  }
</script>

</body>
</html>
